<!DOCTYPE html>
<html>
<head>
    <title>Report Lost Item</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <h2>🔍 Report Lost Item</h2>

    <form id="lostForm">

        <input
            type="text"
            name="title"
            placeholder="Item Title"
            required
        >

        <input
            type="text"
            name="description"
            placeholder="Item Description"
            required
        >

        <input
            type="text"
            name="category"
            placeholder="Category (Bottle, Wallet, ID Card...)"
            required
        >

        <input
            type="text"
            name="location_lost"
            placeholder="Location Lost"
            required
        >

        <input
            type="date"
            name="date_lost"
            required
        >

        <button type="submit">
            Report Lost Item
        </button>

    </form>

    <script src="script.js"></script>

</body>
</html>
